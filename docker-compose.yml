version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: chessmaster-db
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess_secret_2024
      POSTGRES_DB: chessmaster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chessmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: chessmaster-api
    environment:
      DATABASE_URL: postgresql://chess:chess_secret_2024@db:5432/chessmaster
      SECRET_KEY: chessmaster-jwt-secret-key-change-in-prod
      AI_DEFAULT_DEPTH: 4
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
